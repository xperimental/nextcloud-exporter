name: Pull-request
on:
  pull_request:
    branches:
    - master
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-go@v6
      with:
        go-version: "1.26.1"
    - name: golangci-lint
      uses: golangci/golangci-lint-action@v8
      with:
        version: v2.11.4
    - name: promtool
      run: make lint-promtool
